<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha Legacy™</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at top, #14213f 0%, #061022 45%, #000 100%);
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      padding: 38px 26px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 30px;
      background: rgba(3, 7, 16, .78);
      box-shadow: 0 30px 90px rgba(0,0,0,.5);
      text-align: center;
    }
    .logo {
      width: 126px;
      height: 126px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 22px;
      display: block;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 0 35px rgba(255,255,255,.08);
    }
    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: -1px;
    }
    .tagline {
      margin-top: 12px;
      font-size: 16px;
      color: #cfd8ea;
      line-height: 1.7;
    }
    .line {
      width: 46px;
      height: 2px;
      background: #fff;
      opacity: .72;
      margin: 26px auto;
    }
    .text {
      font-size: 16px;
      line-height: 1.9;
      color: #ececec;
      margin-bottom: 28px;
    }
    .quote {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.7;
      margin: 24px 0;
    }
    .button {
      display: block;
      width: 100%;
      padding: 15px 18px;
      margin-top: 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 900;
      color: #05070b;
      background: #f5f5f5;
    }
    .button.secondary {
      background: transparent;
      color: #f5f5f5;
      border: 1px solid rgba(255,255,255,.28);
    }
    footer {
      margin-top: 28px;
      font-size: 13px;
      color: #9ca7bb;
      line-height: 1.6;
    }
  </style>
</head>
